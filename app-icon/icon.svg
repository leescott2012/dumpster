<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="#111111"/>

  <!-- ── BACK LEFT POLAROID (-20deg) ── -->
  <g transform="translate(512,530) rotate(-20) translate(-20,0)">
    <rect x="-200" y="-270" width="400" height="470" rx="16"
          fill="#111111" stroke="white" stroke-width="28" stroke-linejoin="round"/>
    <rect x="-200" y="115" width="400" height="85" rx="0"
          fill="white"/>
    <rect x="-172" y="115" width="344" height="30" fill="#111111"/>
    <rect x="-165" y="-235" width="330" height="340" rx="8"
          fill="#111111" stroke="white" stroke-width="18"/>
  </g>

  <!-- ── BACK RIGHT POLAROID (+16deg) ── -->
  <g transform="translate(512,530) rotate(16) translate(20,0)">
    <rect x="-200" y="-270" width="400" height="470" rx="16"
          fill="#111111" stroke="white" stroke-width="28" stroke-linejoin="round"/>
    <rect x="-200" y="115" width="400" height="85" rx="0"
          fill="white"/>
    <rect x="-172" y="115" width="344" height="30" fill="#111111"/>
    <rect x="-165" y="-235" width="330" height="340" rx="8"
          fill="#111111" stroke="white" stroke-width="18"/>
  </g>

  <!-- ── FRONT CENTER POLAROID (upright) ── -->
  <g transform="translate(512,520)">
    <rect x="-215" y="-290" width="430" height="505" rx="18"
          fill="#111111" stroke="white" stroke-width="30" stroke-linejoin="round"/>
    <!-- white bottom bar -->
    <rect x="-215" y="120" width="430" height="95" rx="0"
          fill="white"/>
    <!-- kill top strip so it looks inside the frame -->
    <rect x="-185" y="120" width="370" height="30" fill="#111111"/>
    <!-- photo area -->
    <rect x="-180" y="-255" width="360" height="365" rx="10"
          fill="#111111" stroke="white" stroke-width="20"/>
    <!-- D letter on white bar -->
    <text x="130" y="205"
          font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-weight="900" font-size="80" fill="#111111"
          text-anchor="middle">D</text>
  </g>

</svg>
